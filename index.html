<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Private Room</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<style>
/* ... (keep all existing styles exactly as before) ... */

/* Settings Panel */
.settings-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 450;
}
.settings-overlay.show {
  display: block;
}
.settings-panel {
  position: fixed;
  top: 0;
  right: -320px;
  width: 300px;
  height: 100%;
  background: var(--card);
  border-left: 1px solid var(--border);
  z-index: 451;
  transition: right 0.3s ease;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}
.settings-panel.open {
  right: 0;
}
.settings-header {
  padding: 20px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.settings-header h2 {
  font-size: 18px;
  font-weight: 600;
}
.settings-close {
  background: none;
  border: none;
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
}
.settings-list {
  flex: 1;
  padding: 8px 0;
}
.settings-item {
  padding: 14px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  transition: background 0.15s;
}
.settings-item:hover {
  background: rgba(255,255,255,0.03);
}
.settings-item .s-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.settings-item.danger {
  color: var(--red);
}
.settings-item.danger .s-icon {
  background: rgba(239,68,68,0.1);
}
.settings-section-title {
  padding: 12px 16px 6px;
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .05em;
}
.settings-toggle {
  margin-left: auto;
  width: 44px;
  height: 24px;
  background: var(--border);
  border-radius: 12px;
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
  flex-shrink: 0;
}
.settings-toggle.active {
  background: var(--accent);
}
.settings-toggle::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 20px;
  height: 20px;
  background: #fff;
  border-radius: 50%;
  transition: left 0.2s;
}
.settings-toggle.active::after {
  left: 22px;
}

/* Settings modals (change name, password) */
.settings-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 460;
  align-items: center;
  justify-content: center;
}
.settings-modal.show {
  display: flex;
}
.settings-modal-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  width: 90%;
  max-width: 340px;
}
.settings-modal-box h3 {
  margin-bottom: 16px;
  font-size: 16px;
}
.settings-modal-box input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  color: var(--text);
  font-size: 14px;
  margin-bottom: 12px;
  outline: none;
}
.settings-modal-box input:focus {
  border-color: var(--accent);
}
.settings-modal-box .btn-row {
  display: flex;
  gap: 8px;
}
.settings-modal-box .btn-row button {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}

/* ... keep rest of existing styles ... */
</style>
</head>
<body>
<!-- ... keep all existing HTML (auth, app-screen, etc.) ... -->

<!-- Add settings button in topbar-right, before share and logout -->
<div class="topbar-right">
  <button class="icon-btn" id="settings-btn">⚙️</button>
  <button class="icon-btn" id="share-btn">🔗</button>
  <button class="icon-btn" id="so-btn">🚪</button>
</div>

<!-- Settings panel -->
<div class="settings-overlay" id="settings-overlay"></div>
<div class="settings-panel" id="settings-panel">
  <div class="settings-header">
    <h2>Settings</h2>
    <button class="settings-close" id="settings-close">✕</button>
  </div>
  <div class="settings-list">
    <div class="settings-section-title">Account</div>
    <div class="settings-item" id="set-edit-name">
      <div class="s-icon">✏️</div> Edit Name
    </div>
    <div class="settings-item" id="set-change-password">
      <div class="s-icon">🔑</div> Change Password
    </div>
    <div class="settings-item" id="set-status">
      <div class="s-icon">💬</div> Custom Status
    </div>

    <div class="settings-section-title">Chat</div>
    <div class="settings-item" id="set-clear-chats">
      <div class="s-icon">🗑️</div> Clear All Messages
    </div>
    <div class="settings-item" id="set-auto-delete">
      <div class="s-icon">⏰</div> Auto‑delete (24h)
      <div class="settings-toggle" id="auto-delete-toggle"></div>
    </div>

    <div class="settings-section-title">Danger</div>
    <div class="settings-item danger" id="set-delete-account">
      <div class="s-icon">⚠️</div> Delete Account
    </div>

    <div class="settings-section-title">About</div>
    <div class="settings-item" style="cursor:default;">
      <div class="s-icon">ℹ️</div>
      <div style="font-size:12px;color:var(--muted);">
        Private Room v1.0<br>
        End‑to‑end encrypted<br>
        Messages auto‑delete after 24h
      </div>
    </div>
  </div>
</div>

<!-- Settings sub‑modals (change name, password) -->
<div class="settings-modal" id="modal-edit-name">
  <div class="settings-modal-box">
    <h3>Edit Display Name</h3>
    <input type="text" id="input-edit-name" placeholder="New name" maxlength="20"/>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeSettingsModal('modal-edit-name')">Cancel</button>
      <button class="btn-save" onclick="saveDisplayName()">Save</button>
    </div>
  </div>
</div>

<div class="settings-modal" id="modal-change-password">
  <div class="settings-modal-box">
    <h3>Change Password</h3>
    <input type="password" id="input-new-password" placeholder="New password (min 6 chars)"/>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeSettingsModal('modal-change-password')">Cancel</button>
      <button class="btn-save" onclick="changePassword()">Change</button>
    </div>
  </div>
</div>

<!-- Keep the rest of the HTML (chat panel, modals, video, etc.) exactly as before -->

<script>
// ... all previous JavaScript code remains identical up to the initApp() function ...

// Add these lines inside initApp() after existing button bindings:

  // Settings panel
  document.getElementById('settings-btn').onclick = toggleSettings;
  document.getElementById('settings-overlay').onclick = toggleSettings;
  document.getElementById('settings-close').onclick = toggleSettings;

  // Settings items
  document.getElementById('set-edit-name').onclick = () => {
    document.getElementById('input-edit-name').value = myName;
    openSettingsModal('modal-edit-name');
  };
  document.getElementById('set-change-password').onclick = () => {
    document.getElementById('input-new-password').value = '';
    openSettingsModal('modal-change-password');
  };
  document.getElementById('set-status').onclick = () => {
    toggleSettings();
    document.getElementById('status-modal').classList.add('show');
  };
  document.getElementById('set-clear-chats').onclick = () => {
    if (confirm('Delete all your messages from this room?')) {
      clearAllChats();
    }
  };
  document.getElementById('set-delete-account').onclick = () => {
    if (confirm('Permanently delete your account? This cannot be undone.')) {
      deleteAccount();
    }
  };

  // Auto‑delete toggle
  const autoDeleteToggle = document.getElementById('auto-delete-toggle');
  // Load saved preference (default true)
  db.ref(`rooms/${ROOM}/settings/${myUid}/autoDelete`).once('value').then(snap => {
    const enabled = snap.val() !== false; // default true
    if (enabled) autoDeleteToggle.classList.add('active');
    else autoDeleteToggle.classList.remove('active');
  });
  autoDeleteToggle.onclick = (e) => {
    e.stopPropagation();
    const currentlyActive = autoDeleteToggle.classList.contains('active');
    const newState = !currentlyActive;
    db.ref(`rooms/${ROOM}/settings/${myUid}/autoDelete`).set(newState);
    if (newState) autoDeleteToggle.classList.add('active');
    else autoDeleteToggle.classList.remove('active');
    // Update cleanup function – it will check this setting before deleting
  };

// Add these new global functions at the end of the script:

function toggleSettings() {
  const panel = document.getElementById('settings-panel');
  const overlay = document.getElementById('settings-overlay');
  const isOpen = panel.classList.contains('open');
  if (isOpen) {
    panel.classList.remove('open');
    overlay.classList.remove('show');
  } else {
    panel.classList.add('open');
    overlay.classList.add('show');
  }
}

function openSettingsModal(modalId) {
  document.getElementById(modalId).classList.add('show');
}

function closeSettingsModal(modalId) {
  document.getElementById(modalId).classList.remove('show');
}

async function saveDisplayName() {
  const newName = document.getElementById('input-edit-name').value.trim();
  if (!newName) return alert('Name cannot be empty');
  try {
    await auth.currentUser.updateProfile({ displayName: newName });
    await db.ref(`rooms/${ROOM}/presence/${myUid}`).update({ username: newName });
    myName = newName;
    document.getElementById('my-uname').textContent = newName;
    document.getElementById('my-av').textContent = newName[0].toUpperCase();
    closeSettingsModal('modal-edit-name');
    alert('Name updated!');
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function changePassword() {
  const newPass = document.getElementById('input-new-password').value;
  if (!newPass || newPass.length < 6) return alert('Password must be at least 6 characters');
  try {
    await auth.currentUser.updatePassword(newPass);
    closeSettingsModal('modal-change-password');
    alert('Password changed successfully!');
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

function clearAllChats() {
  if (!myUid) return;
  Object.keys(allUsers).forEach(uid => {
    if (uid === myUid) return;
    const key = getKey(uid);
    db.ref(`rooms/${ROOM}/dms/${key}/messages`).remove();
  });
  document.getElementById('messages').innerHTML = '';
}

async function deleteAccount() {
  try {
    // Remove user data
    await db.ref(`rooms/${ROOM}/presence/${myUid}`).remove();
    // Clean DM messages
    for (const uid of Object.keys(allUsers)) {
      if (uid === myUid) continue;
      const key = getKey(uid);
      await db.ref(`rooms/${ROOM}/dms/${key}`).remove();
    }
    await auth.currentUser.delete();
    alert('Account deleted.');
  } catch (e) {
    alert('Error: ' + e.message + '. You may need to re-login first.');
  }
}

// Modify cleanupOld() to respect auto‑delete toggle
const origCleanupOld = cleanupOld;
cleanupOld = function() {
  if (!myUid) return;
  db.ref(`rooms/${ROOM}/settings/${myUid}/autoDelete`).once('value').then(snap => {
    if (snap.val() === false) return; // disabled
    origCleanupOld();
  });
};

</script>
</body>
</html>
