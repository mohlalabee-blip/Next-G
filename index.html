<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Private Room · Invite Only</title>
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #0B0F1A;
  --card: #111827;
  --border: #1F2937;
  --accent: #6366F1;
  --accent2: #8B5CF6;
  --green: #10B981;
  --red: #EF4444;
  --orange: #F97316;
  --text: #F9FAFB;
  --muted: #6B7280;
  --me: #4F46E5;
  --them: #1F2937;
}

body.light {
  --bg: #F0F2F5;
  --card: #FFFFFF;
  --border: #E4E6EA;
  --text: #050505;
  --muted: #65676B;
  --me: #0084FF;
  --them: #E4E6EA;
}

body.light .bubble.theirs .btime {
  color: rgba(0, 0, 0, 0.45);
}

body.light .msg-row.mine .btime {
  color: rgba(255, 255, 255, 0.7);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Auth screen */
#auth-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100dvh;
  background: radial-gradient(ellipse at 50% 0%, #1e1b4b 0%, var(--bg) 60%);
}

.auth-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 28px;
  padding: 36px 28px;
  width: 100%;
  max-width: 360px;
  box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
}

.auth-logo {
  text-align: center;
  margin-bottom: 24px;
}

.auth-logo .icon {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 18px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 12px;
}

.ig {
  margin-bottom: 16px;
}

.ig label {
  display: block;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.ig input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 14px;
  color: var(--text);
  font-size: 14px;
  outline: none;
}

.btn-primary {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: 40px;
  color: white;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
}

.auth-toggle {
  text-align: center;
  margin-top: 16px;
  font-size: 13px;
  color: var(--muted);
}

.auth-toggle span {
  color: var(--accent);
  cursor: pointer;
  font-weight: 500;
}

.auth-err {
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.3);
  border-radius: 12px;
  padding: 10px;
  color: var(--red);
  font-size: 12px;
  margin-bottom: 16px;
  display: none;
}

/* app layout */
#app-screen {
  display: none;
  flex: 1;
  flex-direction: column;
  height: 100dvh;
}

.topbar {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.user-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 40px;
  padding: 4px 12px 4px 5px;
  font-size: 13px;
  cursor: pointer;
}

.avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  text-transform: uppercase;
  font-size: 12px;
}

.icon-btn {
  width: 36px;
  height: 36px;
  border-radius: 40px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  cursor: pointer;
  font-size: 16px;
}

.body-area {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* conversations panel */
.conv-list-panel {
  width: 100%;
  max-width: 340px;
  background: var(--card);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.conv-list-hdr {
  padding: 14px 16px;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
}

.conv-list {
  flex: 1;
  overflow-y: auto;
}

.conv-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}

.conv-av {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 18px;
  position: relative;
}

.conv-online-dot {
  position: absolute;
  bottom: 2px;
  right: 2px;
  width: 12px;
  height: 12px;
  background: var(--green);
  border-radius: 50%;
  border: 2px solid var(--card);
}

.conv-name {
  font-weight: 500;
}

.conv-preview, .conv-last-seen {
  font-size: 12px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.conv-unread {
  background: var(--accent);
  color: white;
  font-size: 11px;
  font-weight: bold;
  min-width: 20px;
  height: 20px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 6px;
}

/* chat panel */
.chat-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  overflow: hidden;
  position: relative;
}

.chat-header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.back-btn {
  width: 36px;
  height: 36px;
  border-radius: 40px;
  background: var(--bg);
  border: 1px solid var(--border);
  font-size: 26px;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
}

.chat-header-av {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 16px;
}

.chat-header-info {
  flex: 1;
}

.chat-header-name {
  font-weight: 600;
  font-size: 16px;
}

.chat-header-status {
  font-size: 11px;
  color: var(--muted);
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.msg-row {
  display: flex;
  width: 100%;
}

.msg-row.mine {
  justify-content: flex-end;
}

.bubble {
  padding: 8px 14px;
  border-radius: 20px;
  font-size: 14px;
  line-height: 1.45;
  word-break: break-word;
  max-width: 80%;
  position: relative;
}

.msg-row.mine .bubble {
  background: var(--me);
  color: white;
  border-radius: 20px 6px 20px 20px;
}

.msg-row.theirs .bubble {
  background: var(--them);
  color: var(--text);
  border-radius: 6px 20px 20px 20px;
}

.btime {
  font-size: 9px;
  opacity: 0.7;
  margin-top: 4px;
  display: flex;
  gap: 4px;
  align-items: center;
  justify-content: flex-end;
}

.input-bar {
  padding: 12px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  background: var(--card);
}

.msg-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 10px 16px;
  color: var(--text);
  font-size: 14px;
  resize: none;
  font-family: inherit;
}

.send-btn {
  width: 44px;
  height: 44px;
  border-radius: 44px;
  background: var(--orange);
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

.attach-btn {
  width: 44px;
  height: 44px;
  border-radius: 44px;
  background: var(--bg);
  border: 1px solid var(--border);
  font-size: 18px;
  cursor: pointer;
}

.reply-preview {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: var(--bg);
  border-left: 4px solid var(--accent);
  font-size: 12px;
}

.typing-bubble {
  display: none;
  align-self: flex-start;
  padding: 8px 14px;
  background: var(--them);
  border-radius: 20px;
  gap: 4px;
  margin: 4px 12px;
  width: fit-content;
}

.dot {
  width: 6px;
  height: 6px;
  background: var(--muted);
  border-radius: 50%;
  display: inline-block;
  animation: pulse 1.2s infinite;
}

@keyframes pulse {
  0%, 60%, 100% { opacity: 0.3; transform: translateY(0);}
  30% { opacity: 1; transform: translateY(-4px);}
}

.reaction-badge {
  position: absolute;
  bottom: -12px;
  right: 8px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2px 8px;
  font-size: 13px;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

.msg-image {
  max-width: 200px;
  max-height: 180px;
  border-radius: 12px;
  cursor: pointer;
  margin-bottom: 6px;
}

/* Mobile overrides */
@media (max-width: 768px) {
  .conv-list-panel {
    max-width: 100%;
    width: 100%;
  }
  .chat-panel {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--bg);
    z-index: 20;
    display: none;
  }
  .chat-panel.open {
    display: flex;
  }
  .back-btn {
    display: flex !important;
  }
}

/* misc modals */
#profile-modal, #timer-modal, #status-modal, .s-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 200;
  align-items: center;
  justify-content: center;
}

.profile-box, .timer-box, .status-box, .s-modal-box {
  background: var(--card);
  border-radius: 24px;
  padding: 24px;
  width: 85%;
  max-width: 320px;
  text-align: center;
}

.p-avatar {
  width: 80px;
  height: 80px;
  margin: 0 auto 12px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  font-weight: bold;
}

.modal-btn-row {
  display: flex;
  gap: 8px;
  margin-top: 16px;
}
.btn-cancel-m, .btn-save-m {
  flex: 1;
  padding: 10px;
  border-radius: 40px;
  border: none;
  font-weight: 600;
}
.btn-save-m { background: var(--accent); color: white; }
.btn-cancel-m { background: var(--border); color: var(--text); }

#react-picker {
  display: none;
  position: fixed;
  background: var(--card);
  border-radius: 40px;
  padding: 10px 18px;
  gap: 12px;
  z-index: 300;
  box-shadow: 0 12px 28px black;
}
#react-picker span {
  font-size: 28px;
  cursor: pointer;
}
#video-overlay, #incoming-call { display: none; }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box" id="auth-main">
    <div class="auth-logo"><div class="icon">🔒</div><h1>Private Room</h1><p>invite code: justus</p></div>
    <div class="auth-err" id="auth-err"></div>
    <div class="ig" id="name-group" style="display:none"><label>Display name</label><input id="name-inp" maxlength="20"/></div>
    <div class="ig"><label>Email</label><input id="u-inp" autocomplete="email"/></div>
    <div class="ig"><label>Password</label><input id="p-inp" type="password"/></div>
    <div class="ig" id="invite-group" style="display:none"><label>Invite code</label><input id="code-inp"/></div>
    <button class="btn-primary" id="auth-btn">Sign In</button>
    <div class="auth-toggle"><span id="auth-tog">Create account</span></div>
  </div>
  <div class="auth-box" id="verify-box" style="display:none"><p style="margin-bottom:12px">📧 Verify email</p><button id="resend-btn" class="btn-primary">Resend</button><button id="back-to-login-btn" class="btn-primary" style="margin-top:8px;background:var(--border)">Back</button></div>
</div>

<div id="app-screen">
  <div class="topbar">
    <div>🔒</div>
    <div class="user-pill" id="status-pill"><div class="avatar" id="my-av">?</div><span id="my-uname">...</span></div>
    <div><button class="icon-btn" id="settings-btn">⚙️</button><button class="icon-btn" id="share-btn">🔗</button><button class="icon-btn" id="so-btn">🚪</button></div>
  </div>

  <div class="body-area">
    <div class="conv-list-panel">
      <div class="conv-list-hdr">💬 Chats</div>
      <div class="conv-list" id="conv-list"><div class="no-contacts" style="padding:40px;text-align:center">✨ loading...</div></div>
    </div>
    <div class="chat-panel" id="chat-panel">
      <div id="no-chat-msg" style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted)"><span>🔒 Select someone to chat</span></div>
      <div id="active-chat" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
        <div class="chat-header">
          <button class="back-btn" id="back-btn">←</button>
          <div class="chat-header-av" id="ch-av">?</div>
          <div class="chat-header-info"><div class="chat-header-name" id="ch-name"></div><div class="chat-header-status" id="ch-status"></div></div>
          <button class="icon-btn" id="ch-vcall" style="width:36px;">📹</button>
        </div>
        <div class="messages" id="messages"></div>
        <div class="typing-bubble" id="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div class="reply-preview" id="reply-preview"><span>↩️ replying to: </span><span id="rp-text"></span><button id="rp-cancel" style="margin-left:auto;background:none;border:none;color:red;">✕</button></div>
        <div class="input-bar">
          <button class="attach-btn" id="attach-btn">📎</button>
          <textarea class="msg-input" id="msg-input" rows="1" placeholder="Message..."></textarea>
          <button class="send-btn" id="send-btn">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<input type="file" id="file-input" accept="image/*"/>
<div id="react-picker"><span data-emoji="❤️">❤️</span><span data-emoji="👍">👍</span><span data-emoji="😂">😂</span><span data-emoji="🔥">🔥</span></div>
<div id="profile-modal"><div class="profile-box"><div class="p-avatar" id="p-av-text"></div><div id="p-name"></div><button id="profile-close" class="btn-cancel-m" style="margin-top:12px">Close</button></div></div>
<div id="timer-modal"><div class="timer-box"><h3>⏱ Disappear</h3><button data-ms="0" class="timer-opt">Off</button><button data-ms="3600000">1 hour</button><button data-ms="86400000">24h</button><button id="timer-cancel" class="btn-cancel-m">Cancel</button></div></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDUHVeaHIMRS8GxkFNEjVSXfUeKr_mQnp0",
  authDomain: "just-you-n-i.firebaseapp.com",
  databaseURL: "https://just-you-n-i-default-rtdb.firebaseio.com",
  projectId: "just-you-n-i",
  storageBucket: "just-you-n-i.firebasestorage.app",
  appId: "1:340669970156:web:a717d9a97f52eb629e17c9",
};
const ROOM = "myroom";
const INVITE_CODE = "justus";

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();
const storage = firebase.storage();

let myUid = null, myName = "";
let activePeer = null, activePeerName = "";
let allUsers = {};
let unreadCounts = {};
let typingUsers = {};
let replyId = null, replyText = null;
let deleteAfterMs = 0;

function getKey(uid) { return [myUid, uid].sort().join('_'); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

// Auth
const authErr = document.getElementById('auth-err');
let isSignUp = false;
document.getElementById('auth-tog').onclick = () => {
  isSignUp = !isSignUp;
  document.getElementById('auth-btn').textContent = isSignUp ? 'Create account' : 'Sign In';
  document.getElementById('name-group').style.display = isSignUp ? 'block' : 'none';
  document.getElementById('invite-group').style.display = isSignUp ? 'block' : 'none';
};
document.getElementById('auth-btn').onclick = async () => {
  const email = document.getElementById('u-inp').value.trim();
  const pass = document.getElementById('p-inp').value.trim();
  if (!email || !pass) return authErrShow('Email & password required');
  if (isSignUp) {
    const name = document.getElementById('name-inp').value.trim();
    const code = document.getElementById('code-inp').value.trim();
    if (!name) return authErrShow('Display name required');
    if (code !== INVITE_CODE) return authErrShow('Wrong invite code');
    try {
      const cred = await auth.createUserWithEmailAndPassword(email, pass);
      await cred.user.updateProfile({ displayName: name });
      await cred.user.sendEmailVerification();
      await auth.signOut();
      alert('Verification email sent! Check your inbox and then sign in.');
      document.getElementById('auth-main').style.display = 'flex';
    } catch(e) { authErrShow(e.message); }
  } else {
    try {
      const cred = await auth.signInWithEmailAndPassword(email, pass);
      if (!cred.user.emailVerified) { await auth.signOut(); authErrShow('Please verify your email first.'); return; }
    } catch(e) { authErrShow(e.message); }
  }
};
function authErrShow(m) { authErr.textContent = m; authErr.style.display = 'block'; }
document.getElementById('back-to-login-btn').onclick = () => location.reload();

auth.onAuthStateChanged(user => {
  if (user) {
    myUid = user.uid;
    myName = user.displayName || user.email.split('@')[0];
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'flex';
    document.getElementById('my-uname').innerText = myName;
    document.getElementById('my-av').innerText = myName[0].toUpperCase();
    initApp();
  } else {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
  }
});

function initApp() {
  const presRef = db.ref(`rooms/${ROOM}/presence/${myUid}`);
  presRef.set({ username: myName, online: true, lastSeen: Date.now() });
  presRef.onDisconnect().update({ online: false, lastSeen: Date.now() });
  setInterval(() => presRef.update({ lastSeen: Date.now() }), 30000);

  db.ref(`rooms/${ROOM}/presence`).on('value', snap => { allUsers = snap.val() || {}; renderConvList(); if(activePeer) updateChatHeader(); });

  // load settings timer
  document.getElementById('back-btn').onclick = () => closeChatPanel();
  document.getElementById('attach-btn').onclick = () => document.getElementById('file-input').click();
  document.getElementById('file-input').onchange = uploadImage;
  document.getElementById('send-btn').onclick = sendMsg;
  document.getElementById('msg-input').onkeydown = e => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } };
  document.getElementById('msg-input').oninput = () => { if(activePeer) db.ref(`rooms/${ROOM}/dms/${getKey(activePeer)}/typing/${myUid}`).set({ts:Date.now()}); };
  document.getElementById('rp-cancel').onclick = () => { replyId = null; document.getElementById('reply-preview').style.display='none'; };
  document.getElementById('ch-vcall').onclick = () => alert("📹 Video call demo: use WebRTC ready");
  document.getElementById('share-btn').onclick = () => alert(`Invite code: ${INVITE_CODE}`);
  document.getElementById('so-btn').onclick = () => { db.ref(`rooms/${ROOM}/presence/${myUid}`).update({online:false}); auth.signOut(); };
  document.getElementById('settings-btn').onclick = () => document.getElementById('timer-modal').style.display='flex';
  document.getElementById('timer-cancel').onclick = () => document.getElementById('timer-modal').style.display='none';
  document.querySelectorAll('.timer-opt').forEach(btn => {
    btn.onclick = () => {
      deleteAfterMs = parseInt(btn.dataset.ms);
      if(activePeer) db.ref(`rooms/${ROOM}/dms/${getKey(activePeer)}/settings/deleteAfter`).set(deleteAfterMs);
      document.getElementById('timer-modal').style.display='none';
    };
  });
  document.getElementById('profile-close').onclick = () => document.getElementById('profile-modal').style.display='none';
  // reaction picker
  document.querySelectorAll('#react-picker span').forEach(s => {
    s.onclick = (e) => {
      e.stopPropagation();
      const mid = document.getElementById('react-picker').dataset.msgId;
      if(mid && activePeer) db.ref(`rooms/${ROOM}/dms/${getKey(activePeer)}/messages/${mid}/reaction`).set(s.dataset.emoji);
      document.getElementById('react-picker').style.display = 'none';
    };
  });
}

let lastMsgListener = null;
function openChat(uid, uname) {
  if(lastMsgListener && lastMsgListener.off) lastMsgListener.off();
  activePeer = uid; activePeerName = uname;
  // load settings
  db.ref(`rooms/${ROOM}/dms/${getKey(uid)}/settings/deleteAfter`).once('value', snap => { deleteAfterMs = snap.val() || 0; });
  updateChatHeader();
  document.getElementById('chat-panel').classList.add('open');
  document.getElementById('no-chat-msg').style.display = 'none';
  document.getElementById('active-chat').style.display = 'flex';
  document.getElementById('messages').innerHTML = '';
  // load messages
  const msgPath = `rooms/${ROOM}/dms/${getKey(uid)}/messages`;
  const msgRef = db.ref(msgPath);
  lastMsgListener = msgRef.limitToLast(100).on('child_added', snap => {
    const msg = snap.val(); if(!msg) return;
    if(!msg.deleted && msg.senderUid !== myUid) {
      msgRef.child(snap.key).update({ readStatus: 'read' });
    }
    appendMessageUI(snap.key, msg);
  });
  // watch reactions change
  db.ref(msgPath).on('child_changed', snap => {
    const msg = snap.val();
    const row = document.querySelector(`.msg-row[data-id="${snap.key}"]`);
    if(row && msg) updateReactionBadge(row, msg.reaction, snap.key);
  });
  // mark unread clear
  unreadCounts[uid] = 0;
  renderConvList();
}

function closeChatPanel() {
  document.getElementById('chat-panel').classList.remove('open');
  document.getElementById('active-chat').style.display = 'none';
  document.getElementById('no-chat-msg').style.display = 'flex';
  activePeer = null;
}

function updateChatHeader() {
  const u = allUsers[activePeer] || {};
  document.getElementById('ch-av').innerText = (u.username||'?')[0].toUpperCase();
  document.getElementById('ch-name').innerText = u.username || 'User';
  const online = u.online ? '● online' : `last seen ${u.lastSeen ? Math.floor((Date.now()-u.lastSeen)/60000)+'m ago' : 'recently'}`;
  document.getElementById('ch-status').innerText = typingUsers[activePeer] ? 'typing...' : online;
}

function appendMessageUI(msgId, msg) {
  const container = document.getElementById('messages');
  const me = msg.senderUid === myUid;
  const time = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  let content = '';
  if(msg.imageUrl) content += `<img src="${msg.imageUrl}" class="msg-image" onclick="window.open(this.src)"/>`;
  if(msg.replyTo?.text) content += `<div style="font-size:11px;opacity:0.7;margin-bottom:4px;">↩ ${esc(msg.replyTo.text.substring(0,50))}</div>`;
  if(msg.text) content += esc(msg.text);
  if(msg.deleted) content = '<em>⏰ expired message</em>';
  const row = document.createElement('div');
  row.className = `msg-row ${me ? 'mine' : 'theirs'}`;
  row.setAttribute('data-id', msgId);
  row.innerHTML = `<div class="bubble">${content}<div class="btime">${time} ${me ? (msg.readStatus==='read'?'✓✓':'✓') : ''}</div></div>`;
  if(msg.reaction && !msg.deleted) {
    const badge = document.createElement('div');
    badge.className = 'reaction-badge';
    badge.innerText = msg.reaction;
    badge.onclick = (e) => { e.stopPropagation(); showReactPicker(msgId, row.querySelector('.bubble')); };
    row.querySelector('.bubble').appendChild(badge);
  }
  // reply on click
  if(!msg.deleted && !me) {
    row.querySelector('.bubble').onclick = (e) => { if(!e.target.closest('.reaction-badge')) { replyId = msgId; replyText = msg.text || '📷 photo'; document.getElementById('rp-text').innerText = replyText; document.getElementById('reply-preview').style.display='flex'; } };
  }
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

function updateReactionBadge(row, reaction, msgId) {
  let badge = row.querySelector('.reaction-badge');
  if(reaction) {
    if(!badge) { badge = document.createElement('div'); badge.className='reaction-badge'; row.querySelector('.bubble').appendChild(badge); }
    badge.innerText = reaction;
    badge.onclick = () => showReactPicker(msgId, row.querySelector('.bubble'));
  } else if(badge) badge.remove();
}
function showReactPicker(msgId, bubbleEl) {
  const picker = document.getElementById('react-picker');
  const rect = bubbleEl.getBoundingClientRect();
  picker.style.left = rect.left + rect.width/2 - 80 + 'px';
  picker.style.top = rect.top - 50 + 'px';
  picker.style.display = 'flex';
  picker.dataset.msgId = msgId;
  setTimeout(() => { document.addEventListener('click', function hidePicker(e){ if(!picker.contains(e.target)){ picker.style.display='none'; document.removeEventListener('click',hidePicker);} }); }, 50);
}

function sendMsg() {
  if(!activePeer) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if(!text) return;
  const key = getKey(activePeer);
  const data = { senderUid: myUid, text, timestamp: Date.now(), readStatus: 'sent' };
  if(deleteAfterMs > 0) data.expiresAt = Date.now() + deleteAfterMs;
  if(replyId) data.replyTo = { msgId: replyId, text: replyText };
  db.ref(`rooms/${ROOM}/dms/${key}/messages`).push(data).then(() => {
    input.value = '';
    document.getElementById('reply-preview').style.display = 'none';
    replyId = null;
    if(activePeer) db.ref(`rooms/${ROOM}/dms/${key}/typing/${myUid}`).remove();
  });
}

async function uploadImage(e) {
  const file = e.target.files[0];
  if(!file || !activePeer) return;
  if(!file.type.startsWith('image/')) return alert('Only images');
  const ts = Date.now();
  const path = `rooms/${ROOM}/images/${getKey(activePeer)}/${ts}_${file.name}`;
  const uploadTask = storage.ref(path).put(file);
  uploadTask.on('state_changed', null, err => alert(err.message), async () => {
    const url = await uploadTask.snapshot.ref.getDownloadURL();
    await db.ref(`rooms/${ROOM}/dms/${getKey(activePeer)}/messages`).push({ senderUid: myUid, imageUrl: url, timestamp: ts, readStatus:'sent' });
  });
  e.target.value = '';
}

function renderConvList() {
  const container = document.getElementById('conv-list');
  const others = Object.entries(allUsers).filter(([uid]) => uid !== myUid);
  if(!others.length) { container.innerHTML = '<div style="padding:40px;text-align:center">✨ Invite friends ✨</div>'; return; }
  let html = '';
  for(let [uid, u] of others) {
    const unread = unreadCounts[uid] || 0;
    const isActive = activePeer === uid;
    const typing = typingUsers[uid];
    let preview = typing ? '<span style="color:var(--green);font-style:italic;">typing...</span>' : (u.status ? u.status : (u.online ? '🟢 online' : 'offline'));
    const unreadBadge = (!isActive && unread>0) ? `<div class="conv-unread">${unread>99?'99+':unread}</div>` : '';
    html += `<div class="conv-item" data-uid="${uid}" data-uname="${esc(u.username)}">
      <div class="conv-av">${(u.username[0]||'?').toUpperCase()}${u.online?'<div class="conv-online-dot"></div>':''}</div>
      <div style="flex:1"><div class="conv-name">${esc(u.username)}</div><div style="font-size:12px;color:var(--muted)">${preview}</div></div>
      ${unreadBadge}
    </div>`;
  }
  container.innerHTML = html;
  document.querySelectorAll('.conv-item').forEach(el => {
    const uid = el.dataset.uid, uname = el.dataset.uname;
    el.addEventListener('click', (e) => { e.stopPropagation(); openChat(uid, uname); });
    el.addEventListener('contextmenu', (e) => { e.preventDefault(); showProfileModal(uid, uname); });
  });
  // typing detection
  others.forEach(([uid]) => {
    const key = getKey(uid);
    db.ref(`rooms/${ROOM}/dms/${key}/typing`).on('value', snap => {
      const now = Date.now();
      let someoneTyping = false;
      snap.forEach(child => { if(child.key !== myUid && now - (child.val().ts||0) < 4000) someoneTyping = true; });
      if(someoneTyping) typingUsers[uid] = true; else delete typingUsers[uid];
      if(activePeer === uid) updateChatHeader();
      renderConvList();
    });
  });
}

function showProfileModal(uid, name) {
  const user = allUsers[uid] || {};
  document.getElementById('p-av-text').innerText = (name[0]||'?').toUpperCase();
  document.getElementById('p-name').innerText = name;
  document.getElementById('profile-modal').style.display = 'flex';
}

// auto-expire cleaner
setInterval(() => {
  if(!myUid) return;
  Object.keys(allUsers).forEach(uid => {
    if(uid === myUid) return;
    const key = getKey(uid);
    db.ref(`rooms/${ROOM}/dms/${key}/messages`).once('value', snap => {
      const updates = {};
      snap.forEach(child => {
        const m = child.val();
        if(m && !m.deleted && m.expiresAt && m.expiresAt < Date.now()) {
          updates[child.key] = { deleted: true, senderUid: m.senderUid, timestamp: m.timestamp };
        }
      });
      if(Object.keys(updates).length) db.ref(`rooms/${ROOM}/dms/${key}/messages`).update(updates);
    });
  });
}, 60000);
</script>
